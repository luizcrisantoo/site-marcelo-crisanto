<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Página não encontrada — Dr. Marcelo Crisanto</title>
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .err { min-height: 100vh; display: grid; place-items: center; text-align: center;
           background: linear-gradient(160deg, var(--bg-soft) 0%, var(--bg-color) 60%); padding: var(--spacing-lg); }
    .err__code { font-family: var(--font-heading); font-weight: 700; font-size: clamp(4rem, 14vw, 8rem);
                 color: var(--primary-color); line-height: 1; }
    .err h1 { font-size: var(--fs-h2); margin: var(--spacing-md) 0; }
    .err p { max-width: 46ch; margin: 0 auto var(--spacing-lg); }
    .err .btn { display: inline-flex; }
  </style>
</head>
<body>
  <main class="err">
    <div>
      <p class="err__code">404</p>
      <h1>Esta página não foi encontrada</h1>
      <p>O endereço pode ter mudado ou não existe mais. Vamos te levar de volta ao início.</p>
      <a class="btn btn-primary" href="/">Voltar à página inicial</a>
    </div>
  </main>
</body>
</html>
